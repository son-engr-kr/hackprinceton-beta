# image-gen prompts — v2 expansion
#
# Additional food/ingredient/meal items to generate alongside the original
# prompts.yaml set. Keeping this in a separate file + routing output to a
# separate --images-dir (e.g. images-v2/) avoids mixing newly-generated
# candidates with the previously curated images-chose/ selection.
#
# Run:
#   uv run python generate_images.py --all --model juggernaut --seeds 2 \
#     --prompts-file prompts-v2.yaml --images-dir images-v2
#
# Shares the same negative + styles as prompts.yaml so generator output is
# consistent; downstream normalize/prune/compress scripts stay unchanged
# (point them at images-v2 instead of images).

negative: "shadow, dark shadow, drop shadow, cast shadow, blurry, text, watermark, low quality, multiple items, clutter, distracting background, hands, plate rim, cropped, out of frame, close-up, extreme close-up, macro, zoomed in, subject touching edges, cut off"

styles:
  realistic: >
    product photograph, wide shot, subject fills 50 percent of frame,
    ample white margin on all sides, 45-degree angle from above,
    studio lighting, sharp focus, clean white background, centered, photorealistic, 4k
  cartoon: >
    cartoon illustration, wide shot, subject fills 50 percent of frame,
    ample white margin on all sides, 45-degree angle from above,
    bright saturated colors, thick clean outlines, flat cel shading, white background, centered

