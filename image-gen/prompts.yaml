  # ─ Mascot "Motji" poses — self-styled, no style suffix applied ─────────
  # Chibi kawaii character portraits. Keep visual coherence across poses.
  mascot:
    description: "Motji mascot poses (chibi dumpling character)"
    apply_style: false
    items:
      mascot_wave: >
        chubby dumpling mascot character, round pillowy body,
        tiny chef apron, small spoon hairpin, big sparkly eyes with highlights,
        soft peach and cream pastel palette, kawaii chibi style,
        rubber hose limbs, thick clean outlines, soft cel shading,
        waving one hand raised, warm smile, full body centered, white background
      mascot_jump: >
        chubby dumpling mascot character, round pillowy body,
        tiny chef apron, small spoon hairpin, big sparkly eyes,
        soft peach and cream pastel palette, kawaii chibi style,
        mid-jump with both arms raised, motion lines, excited expression,
        full body centered, white background
      mascot_thinking: >
        chubby dumpling mascot character, round pillowy body,
        tiny chef apron, small spoon hairpin, big sparkly eyes,
        soft peach and cream pastel palette, kawaii chibi style,
