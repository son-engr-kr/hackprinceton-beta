# image-gen prompts
#
# Structure:
#   negative   — shared negative prompt across all items + styles
#   styles     — style suffixes appended to each item prompt (except mascot)
#                Food / ingredient / meal items render in both styles.
#   categories — item base prompts (pure subject, no style adjectives)
#
# Style is orthogonal to content, so item prompts stay style-agnostic. The
# generator combines: "<prefix><item>, <style suffix>".
# Mascot category is self-styled (chibi/kawaii illustration) and bypasses
# the style suffix.

negative: "shadow, dark shadow, drop shadow, cast shadow, blurry, text, watermark, low quality, multiple items, clutter, distracting background, hands, plate rim, cropped, out of frame, close-up, extreme close-up, macro, zoomed in, subject touching edges, cut off"

styles:
  realistic: >
    product photograph, wide shot, subject fills 50 percent of frame,
    ample white margin on all sides, 45-degree angle from above,
    studio lighting, sharp focus, clean white background, centered, photorealistic, 4k
  cartoon: >
    cartoon illustration, wide shot, subject fills 50 percent of frame,
    ample white margin on all sides, 45-degree angle from above,
    bright saturated colors, thick clean outlines, flat cel shading, white background, centered

categories:

